<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: #0B1120;
            color: #E7ECF5;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .loader-box {
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #1A2440;
            border-top: 4px solid #4FE3C1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 {
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>
    <div class="loader-box">
        <div class="spinner" id="spinner"></div>
        <h2 id="status">Routing connection...</h2>
    </div>

    <script>
        (async function() {
            "use strict";
            // 1. Connection Configurations
            const SUPABASE_URL = 'https://ormpdfzuczlrabdevohr.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_9DhjEALPNbsbjCt184chTQ_Z_oqNjsM';
            const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // 2. Parse URL Parameters
            const urlParams = new URLSearchParams(window.location.search);
            const qrId = urlParams.get('qr_id');

            const statusEl = document.getElementById('status');
            const spinnerEl = document.getElementById('spinner');

            if (!qrId) {
                statusEl.innerText = "Error: Invalid hardware token or parameters missing.";
                spinnerEl.style.display = 'none';
                return;
            }

            // Defense-in-depth: even though the target_url is validated at write time
            // (admin console), never redirect to a non-http(s) URL from this public page.
            function isValidTargetUrl(str) {
                try {
                    const u = new URL(str);
                    return u.protocol === "https:" || u.protocol === "http:";
                } catch (e) {
                    return false;
                }
            }

            try {
                // 3. Atomically look up the target AND increment the scan counter
                //    in a single server-side call. This uses a SECURITY DEFINER
                //    Postgres function (scan_qr), so the anon key has NO direct
                //    SELECT/UPDATE grant on qr_codes — the row-level lookup and the
                //    increment both happen inside one locked, atomic transaction on
                //    the database, which means a client can't forge/replay scan
                //    counts by reading the value and writing back a fake one.
                const { data, error } = await supabaseClient.rpc('scan_qr', { p_qr_id: qrId });

                if (error || !data || data.length === 0) {
                    statusEl.innerText = "Network transmission error. Please retry.";
                    spinnerEl.style.display = 'none';
                    return;
                }

                const result = data[0];

                if (!result.found) {
                    statusEl.innerText = "Activation Error: QR code profile not found.";
                    spinnerEl.style.display = 'none';
                    return;
                }

                if (result.is_paused) {
                    statusEl.innerText = "This redirection link has been temporarily paused.";
                    spinnerEl.style.display = 'none';
                    return;
                }

                if (!result.target_url || !isValidTargetUrl(result.target_url)) {
                    statusEl.innerText = "Error: Destination link is invalid.";
                    spinnerEl.style.display = 'none';
                    return;
                }

                // 4. Instantly forward browser focus context
                window.location.replace(result.target_url);

            } catch (err) {
                statusEl.innerText = "Network transmission error. Please retry.";
                spinnerEl.style.display = 'none';
            }
        })();
    </script>
</body>
</html>
